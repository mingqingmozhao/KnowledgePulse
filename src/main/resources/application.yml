server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/knowledge_pulse?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      timeout: 10000ms
  
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath:mapper/*.xml

knife4j:
  enable: true
  setting:
    language: zh_cn

jwt:
  secret: knowledge-pulse-secret-key-2024-must-be-at-least-32-characters
  expiration: 86400000
  refresh-expiration: 604800000

quartz:
  job-store-type: memory
  properties:
    org:
      quartz:
        scheduler:
          instanceName: KnowledgePulseScheduler
        threadPool:
          threadCount: 5

logging:
  level:
    com.ahy.knowledgepulse: DEBUG
    org.springframework.security: INFO
